services:
  redis:
    image: redis:7-alpine
    container_name: sponsor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sponsor_network

  minio:
    image: minio/minio:latest
    container_name: sponsor_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sponsor_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sponsor_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb+srv://sponsor_db:Sponsor%40123@sponsor-cluster.uzhoewt.mongodb.net/sponsor_analyzer?retryWrites=true&w=majority&appName=sponsor-cluster
      JWT_SECRET: 8ef201c1dbe54e250d6ab0f15a4061eb782687e2804bb3dca30008261c05afa74f97b090a6f052df14d1ff796525ab48e98d30f2f167abf888e6ca13efce725b
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - redis
      - minio
    networks:
      - sponsor_network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: sponsor_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    volumes:
      - ./ai-service:/app
    depends_on:
      - minio
    networks:
      - sponsor_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sponsor_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - sponsor_network

  nginx:
    image: nginx:alpine
    container_name: sponsor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server
      - client
    networks:
      - sponsor_network

volumes:
  redis_data:
  minio_data:

networks:
  sponsor_network:
    driver: bridge
